<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quraan Pro</title>

<link rel="manifest" href="./manifest.json">

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
 color:white;
}

/* GLASS */
.glass{
 background:rgba(255,255,255,0.1);
 backdrop-filter:blur(15px);
 border-radius:15px;
 box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

/* TOP */
.top{
 display:flex;
 gap:6px;
 padding:10px;
 position:sticky;
 top:0;
}

/* BUTTON */
button{
 padding:8px;
 border:none;
 border-radius:10px;
 background:rgba(255,255,255,0.2);
 color:white;
}

/* SIDEBAR */
#sidebar{
 position:fixed;
 left:-260px;
 width:250px;
 height:100%;
 background:rgba(0,0,0,0.7);
 backdrop-filter:blur(20px);
 transition:.3s;
 overflow:auto;
}
#sidebar.active{left:0;}

.surah{
 padding:12px;
 border-bottom:1px solid rgba(255,255,255,0.1);
 cursor:pointer;
}

/* AYAH */
.ayah{
 margin:12px;
 padding:12px;
 transition:.3s;
}
.activeAyah{
 border:2px solid #00e5ff;
 background:rgba(0,229,255,0.1);
}

/* ARABIC */
.arabic{
 font-size:24px;
 text-align:right;
}

/* TAJWEED COLORS */
.madd{color:#00e5ff;}
.ghunna{color:#ff4081;}
.qalqala{color:#ffd600;}
.ikhfa{color:#69f0ae;}

</style>
</head>

<body>

<div class="top glass">
 <button onclick="toggleSidebar()">☰</button>
 <button onclick="toggleDark()">🌙</button>
</div>

<div style="padding:10px">
 Translation:
 <select onchange="changeTrans(this.value)">
  <option value="en.asad">Asad</option>
  <option value="en.sahih">Sahih</option>
  <option value="ur.jalandhry">Urdu</option>
 </select>
</div>

<input class="glass" placeholder="Search..." oninput="search(this.value)" style="width:95%;margin:10px;padding:10px;">

<div id="sidebar"></div>
<div id="content"></div>

<script>
let Quran=[],currentSurah=null;
let audio=new Audio();
let reciter="ar.alafasy";
let translation="en.asad";
let currentIndex=0;

// LOAD
async function loadQuran(){
 let r=await fetch("https://api.alquran.cloud/v1/quran/quran-uthmani");
 Quran=(await r.json()).data.surahs;
 renderSidebar(Quran);
}

// SIDEBAR
function renderSidebar(list){
 sidebar.innerHTML=list.map(s=>
 `<div class="surah" onclick="openSurah(${s.number})">${s.number}. ${s.englishName}</div>`
 ).join("");
}
function toggleSidebar(){sidebar.classList.toggle("active");}
function closeSidebar(){sidebar.classList.remove("active");}

// TAJWEED
function tajweed(t){
 return t
  .replace(/م/g,'<span class="ghunna">م</span>')
  .replace(/ن/g,'<span class="ghunna">ن</span>')
  .replace(/ق/g,'<span class="qalqala">ق</span>')
  .replace(/ا/g,'<span class="madd">ا</span>');
}

// OPEN SURAH
async function openSurah(num){
 closeSidebar();
 currentSurah=Quran.find(s=>s.number==num);

 let t=await fetch(`https://api.alquran.cloud/v1/surah/${num}/${translation}`);
 let trans=(await t.json()).data.ayahs;

 let html=`<h2 style="padding:10px">${currentSurah.englishName}</h2>`;

 currentSurah.ayahs.forEach((a,i)=>{
 html+=`
 <div class="ayah glass" id="ayah-${i}">
  <div>${i+1}</div>
  <div class="arabic">${tajweed(a.text)}</div>
  <div>${trans[i].text}</div>

  <button onclick="play(${i})">▶</button>
 </div>`;
 });

 content.innerHTML=html;
}

// PLAY
function play(i){
 currentIndex=i;
 highlight(i);

 let num=currentSurah.ayahs[i].number;
 audio.src=`https://cdn.islamic.network/quran/audio/128/${reciter}/${num}.mp3`;
 audio.play();
}

// AUTO NEXT + HIGHLIGHT
audio.onended=()=>{
 currentIndex++;
 if(currentIndex<currentSurah.ayahs.length){
  play(currentIndex);
 }
};

// HIGHLIGHT
function highlight(i){
 document.querySelectorAll(".ayah").forEach(a=>a.classList.remove("activeAyah"));
 let el=document.getElementById("ayah-"+i);
 if(el) el.classList.add("activeAyah");
}

// SEARCH
function search(q){
 q=q.toLowerCase();
 renderSidebar(Quran.filter(s=>s.englishName.toLowerCase().includes(q)));
}

// SETTINGS
function changeTrans(t){
 translation=t;
 if(currentSurah) openSurah(currentSurah.number);
}

// UI
function toggleDark(){document.body.style.background="black";}

// PWA
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('./service-worker.js');
}

// INIT
loadQuran();
</script>

</body>
</html>
