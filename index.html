<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quraan Pro</title>

<link rel="manifest" href="./manifest.json">

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
 color:white;
}

/* GLASS UI */
.glass{
 background:rgba(255,255,255,0.1);
 backdrop-filter:blur(15px);
 border-radius:15px;
}

/* TOP */
.top{
 display:flex;
 flex-wrap:wrap;
 gap:5px;
 padding:10px;
}

/* BUTTON */
button{
 padding:8px;
 border:none;
 border-radius:10px;
 background:rgba(255,255,255,0.2);
 color:white;
}

/* SIDEBAR */
#sidebar{
 position:fixed;
 left:-260px;
 width:250px;
 height:100%;
 background:rgba(0,0,0,0.7);
 transition:.3s;
 overflow:auto;
}
#sidebar.active{left:0;}

.surah{
 padding:10px;
 border-bottom:1px solid #333;
 cursor:pointer;
}

/* AYAH */
.ayah{
 margin:10px;
 padding:10px;
}
.activeAyah{
 border:2px solid #00e5ff;
}

/* ARABIC */
.arabic{
 font-size:24px;
 text-align:right;
}

/* TAJWEED COLORS */
.madd{color:#00e5ff;}
.ikhfa{color:#ab47bc;}
.qalqala{color:#ffd600;}
.noon,.tanween{color:#ff4081;}
.meem{color:#00e676;}
.idgham{color:#ff9800;}
.silent{color:#777;}

/* LEGEND POPUP */
#legend{
 position:fixed;
 top:10%;
 left:10%;
 width:80%;
 background:#111;
 padding:15px;
 border-radius:10px;
 display:none;
}
</style>
</head>

<body>

<div class="top glass">
 <button onclick="toggleSidebar()">☰</button>
 <button onclick="toggleDark()">🌙</button>
 <button onclick="toggleTajweed()">🧠 Tajweed</button>
 <button onclick="showLegend()">📖 Rules</button>
 <button onclick="installApp()">📱 Install</button>
</div>

<input placeholder="Search..." oninput="search(this.value)" style="width:95%;margin:10px;padding:10px;">

<div id="sidebar"></div>
<div id="content"></div>

<!-- LEGEND -->
<div id="legend">
 <h3>Tajweed Rules 🎨</h3>

 <p class="madd">Blue → Madd (Stretch)</p>
 <p class="ikhfa">Purple → Ikhfa (Hidden)</p>
 <p class="qalqala">Yellow → Qalqalah (Echo)</p>
 <p class="noon">Pink → Noon Saakin / Tanween</p>
 <p class="meem">Green → Meem Saakin</p>
 <p class="idgham">Orange → Idgham (Merge)</p>
 <p class="silent">Gray → Silent</p>

 <button onclick="closeLegend()">Close</button>
</div>

<script>
let Quran=[],currentSurah=null;
let audio=new Audio();
let tajweedOn=true;
let currentIndex=0;
let deferredPrompt;

// PWA INSTALL
window.addEventListener('beforeinstallprompt', e=>{
 e.preventDefault();
 deferredPrompt=e;
});
function installApp(){
 if(deferredPrompt) deferredPrompt.prompt();
}

// LOAD QURAN
async function loadQuran(){
 let r=await fetch("https://api.alquran.cloud/v1/quran/quran-uthmani");
 Quran=(await r.json()).data.surahs;
 renderSidebar(Quran);
}

// SIDEBAR
function renderSidebar(list){
 sidebar.innerHTML=list.map(s=>`<div class="surah" onclick="openSurah(${s.number})">${s.number}. ${s.englishName}</div>`).join("");
}
function toggleSidebar(){sidebar.classList.toggle("active");}
function closeSidebar(){sidebar.classList.remove("active");}

// TAJWEED ENGINE
function tajweed(text){
 if(!tajweedOn) return text;

 let t=text;
 t=t.replace(/([ًٌٍ])/g,'<span class="tanween">$1</span>');
 t=t.replace(/نْ/g,'<span class="noon">نْ</span>');
 t=t.replace(/مْ/g,'<span class="meem">مْ</span>');
 t=t.replace(/[اوي]/g,'<span class="madd">$&</span>');
 t=t.replace(/[قطبجد]/g,'<span class="qalqala">$&</span>');
 t=t.replace(/[تثجدذرزسشصضطظفقك]/g,'<span class="ikhfa">$&</span>');
 t=t.replace(/[يرملون]/g,'<span class="idgham">$&</span>');
 t=t.replace(/ْ/g,'<span class="silent">ْ</span>');
 return t;
}

// OPEN SURAH
async function openSurah(num){
 closeSidebar();
 currentSurah=Quran.find(s=>s.number==num);

 let t=await fetch(`https://api.alquran.cloud/v1/surah/${num}/en.asad`);
 let trans=(await t.json()).data.ayahs;

 let html=`<h2 style="padding:10px">${currentSurah.englishName}</h2>`;

 currentSurah.ayahs.forEach((a,i)=>{
 html+=`
 <div class="ayah glass" id="ayah-${i}">
  <div>${i+1}</div>
  <div class="arabic">${tajweed(a.text)}</div>
  <div>${trans[i].text}</div>

  <button onclick="play(${i})">▶</button>
 </div>`;
 });

 content.innerHTML=html;
}

// AUDIO + HIGHLIGHT
function play(i){
 currentIndex=i;
 highlight(i);

 let n=currentSurah.ayahs[i].number;
 audio.src=`https://cdn.islamic.network/quran/audio/128/ar.alafasy/${n}.mp3`;
 audio.play();
}

audio.onended=()=>{
 currentIndex++;
 if(currentIndex<currentSurah.ayahs.length){
  play(currentIndex);
 }
};

// HIGHLIGHT
function highlight(i){
 document.querySelectorAll(".ayah").forEach(a=>a.classList.remove("activeAyah"));
 let el=document.getElementById("ayah-"+i);
 if(el) el.classList.add("activeAyah");
}

// SEARCH
function search(q){
 q=q.toLowerCase();
 renderSidebar(Quran.filter(s=>s.englishName.toLowerCase().includes(q)));
}

// UI
function toggleDark(){document.body.style.background="black";}
function toggleTajweed(){
 tajweedOn=!tajweedOn;
 if(currentSurah) openSurah(currentSurah.number);
}

// LEGEND
function showLegend(){legend.style.display="block";}
function closeLegend(){legend.style.display="none";}

// SW
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('./service-worker.js');
}

// INIT
loadQuran();
</script>

</body>
</html>
