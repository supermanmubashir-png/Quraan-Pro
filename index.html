<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quraan Pro</title>

<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.png">

<style>
body{margin:0;font-family:sans-serif;background:#0f2027;color:white;}
.glass{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:10px;}
.top{display:flex;flex-wrap:wrap;gap:5px;padding:10px;}
button{padding:8px;border:none;border-radius:8px;background:#ffffff22;color:white;}

#sidebar{position:fixed;left:-260px;width:250px;height:100%;background:#111;overflow:auto;transition:.3s;}
#sidebar.active{left:0;}
#sidebar div{padding:12px;border-bottom:1px solid #333;cursor:pointer;}
#sidebar div:hover{background:#00e5ff33;}

.ayah{margin:10px;padding:10px;}
.activeAyah{border:2px solid cyan;}
.arabic{font-size:24px;text-align:right;}

/* Tajweed */
.madd{color:#00e5ff;}
.qalqala{color:#ffd600;}
.noon{color:#ff4081;}
.meem{color:#00e676;}

.panel{position:fixed;top:10%;left:10%;width:80%;background:#111;padding:15px;border-radius:10px;display:none;}
</style>
</head>

<body>

<div class="top glass">
 <button onclick="toggleSidebar()">☰</button>
 <button onclick="toggleDark()">🌙</button>
 <button onclick="toggleTajweed()">🧠</button>
 <button onclick="openGoto()">🎯</button>
 <button onclick="openSettings()">⚙</button>
 <button onclick="showLegend()">📖</button>
 <button onclick="getNamaz()">🕌</button>
 <button onclick="getQiblah()">🧭</button>
 <button onclick="installApp()">📱</button>
</div>

<input placeholder="Search..." oninput="search(this.value)" style="width:95%;margin:10px;padding:10px;">

<div id="sidebar"></div>
<div id="content"></div>

<!-- SETTINGS -->
<div id="settings" class="panel">
<h3>Settings</h3>
Reciter:
<select onchange="setReciter(this.value)">
<option value="ar.alafasy">Alafasy</option>
<option value="ar.abdurrahmaansudais">Sudais</option>
</select><br><br>

Translation:
<select onchange="changeTrans(this.value)">
<option value="en.asad">Asad</option>
<option value="en.sahih">Sahih</option>
<option value="ur.jalandhry">Urdu</option>
</select><br><br>

<button onclick="resume()">Resume ⭐</button>
<button onclick="settings.style.display='none'">Close</button>
</div>

<!-- GOTO -->
<div id="goto" class="panel">
Surah: <input id="suraInput"><br><br>
Ayah: <input id="ayahInput"><br><br>
<button onclick="goToAyah()">Go</button>
<button onclick="goto.style.display='none'">Close</button>
</div>

<!-- LEGEND -->
<div id="legend" class="panel">
<p class="madd">Blue → Madd</p>
<p class="qalqala">Yellow → Qalqalah</p>
<p class="noon">Pink → Noon</p>
<p class="meem">Green → Meem</p>
<button onclick="legend.style.display='none'">Close</button>
</div>

<script>
let Quran=[],currentSurah=null;
let audio=new Audio();
let currentIndex=0;
let tajweedOn=true;
let translation="en.asad";
let reciter=localStorage.getItem("reciter")||"ar.alafasy";
let deferredPrompt;

// INSTALL
window.addEventListener('beforeinstallprompt', e=>{
 e.preventDefault(); deferredPrompt=e;
});
function installApp(){if(deferredPrompt) deferredPrompt.prompt();}

// LOAD
async function loadQuran(){
 let r=await fetch("https://api.alquran.cloud/v1/quran/quran-uthmani");
 Quran=(await r.json()).data.surahs;
 renderSidebar(Quran);
}

// SIDEBAR
function renderSidebar(list){
 sidebar.innerHTML=list.map(s=>`<div onclick="openSurah(${s.number})">${s.number}. ${s.englishName}</div>`).join("");
}
function toggleSidebar(){sidebar.classList.toggle("active");}
function closeSidebar(){sidebar.classList.remove("active");}

// TAJWEED
function tajweed(t){
 if(!tajweedOn) return t;
 return t
 .replace(/[اوي]/g,'<span class="madd">$&</span>')
 .replace(/[قطبجد]/g,'<span class="qalqala">$&</span>')
 .replace(/ن/g,'<span class="noon">ن</span>')
 .replace(/م/g,'<span class="meem">م</span>');
}

// OPEN SURAH
async function openSurah(num){
 closeSidebar();
 currentSurah=Quran.find(s=>s.number==num);

 let t=await fetch(`https://api.alquran.cloud/v1/surah/${num}/${translation}`);
 let trans=(await t.json()).data.ayahs;

 let html="";
 currentSurah.ayahs.forEach((a,i)=>{
 html+=`
 <div class="ayah glass" id="a${i}">
  <div>${i+1}</div>
  <div class="arabic">${tajweed(a.text)}</div>
  <div>${trans[i].text}</div>

  <button onclick="play(${i})">▶</button>
 </div>`;
 });

 content.innerHTML=html;
}

// AUDIO
function play(i){
 currentIndex=i;
 highlight(i);

 let n=currentSurah.ayahs[i].number;
 audio.src=`https://cdn.islamic.network/quran/audio/128/${reciter}/${n}.mp3`;
 audio.play();
}

audio.onended=()=>{
 currentIndex++;
 if(currentIndex<currentSurah.ayahs.length) play(currentIndex);
};

// HIGHLIGHT
function highlight(i){
 document.querySelectorAll(".ayah").forEach(e=>e.classList.remove("activeAyah"));
 let el=document.getElementById("a"+i);
 if(el){
  el.classList.add("activeAyah");
  el.scrollIntoView({behavior:"smooth",block:"center"});
 }
}

// SEARCH
function search(q){
 q=q.toLowerCase();
 renderSidebar(Quran.filter(s=>s.englishName.toLowerCase().includes(q)));
}

// SETTINGS
function openSettings(){settings.style.display="block";}
function setReciter(r){reciter=r;localStorage.setItem("reciter",r);}
function changeTrans(t){translation=t;if(currentSurah) openSurah(currentSurah.number);}
function toggleDark(){document.body.style.background="black";}
function toggleTajweed(){tajweedOn=!tajweedOn;if(currentSurah) openSurah(currentSurah.number);}

// BOOKMARK
function bookmark(s,i){localStorage.setItem("bm",JSON.stringify({s,i}));}
function resume(){
 let b=JSON.parse(localStorage.getItem("bm"));
 if(b){openSurah(b.s);setTimeout(()=>highlight(b.i),500);}
}

// GOTO
function openGoto(){goto.style.display="block";}
function goToAyah(){
 let s=parseInt(suraInput.value);
 let a=parseInt(ayahInput.value)-1;
 openSurah(s);
 setTimeout(()=>highlight(a),800);
}

// NAMAZ
async function getNamaz(){
 let r=await fetch("https://api.aladhan.com/v1/timingsByCity?city=Delhi&country=India");
 let d=(await r.json()).data.timings;
 alert(`Fajr:${d.Fajr}\nDhuhr:${d.Dhuhr}\nAsr:${d.Asr}\nMaghrib:${d.Maghrib}\nIsha:${d.Isha}`);
}

// QIBLAH
function getQiblah(){
 navigator.geolocation.getCurrentPosition(pos=>{
  let lat=pos.coords.latitude*Math.PI/180;
  let lon=pos.coords.longitude;
  let kaabaLat=21.4225*Math.PI/180;
  let kaabaLon=39.8262;

  let dLon=(kaabaLon-lon)*Math.PI/180;
  let y=Math.sin(dLon);
  let x=Math.cos(lat)*Math.tan(kaabaLat)-Math.sin(lat)*Math.cos(dLon);
  let angle=Math.atan2(y,x)*180/Math.PI;

  alert("Qiblah: "+Math.round(angle)+"°");
 });
}

// LEGEND
function showLegend(){legend.style.display="block";}

// SW
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('./service-worker.js');
}

// INIT
loadQuran();
</script>

</body>
</html>
