<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quraan Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2027">

<style>
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white;}
.dark{background:black;}
#sidebar{position:fixed;left:-260px;width:250px;height:100%;background:#111;overflow:auto;transition:.3s;}
#sidebar.active{left:0;}
.surah{padding:10px;border-bottom:1px solid #333;cursor:pointer;}
.ayah{background:rgba(255,255,255,0.05);margin:10px;padding:10px;border-radius:10px;}
.arabic{font-size:22px;text-align:right;}
.controls button{margin:3px;padding:5px;border:none;border-radius:5px;background:#00c853;color:white;}
.top{display:flex;gap:5px;padding:10px;flex-wrap:wrap;}
</style>
</head>

<body>

<div class="top">
 <button onclick="toggleSidebar()">☰</button>
 <button onclick="toggleDark()">🌙</button>
 <button onclick="toggleTrans()">🌍</button>
 <button onclick="resume()">⏮</button>
 <button onclick="getNamaz()">🕌</button>
 <button onclick="getQibla()">🧭</button>
</div>

<input placeholder="Search..." oninput="search(this.value)">

<div id="sidebar"></div>
<div id="content"></div>

<script>
let Quran=[],currentSurah=null;
let audio=new Audio();
let loop=false,cont=false;
let showTrans=true;
let reciter="ar.alafasy";

// ============================
// LOAD QURAN
// ============================
async function loadQuran(){
 let r=await fetch("https://api.alquran.cloud/v1/quran/quran-uthmani");
 Quran=(await r.json()).data.surahs;
 renderSidebar(Quran);
}

// ============================
// SIDEBAR
// ============================
function renderSidebar(list){
 sidebar.innerHTML=list.map(s=>`<div class="surah" onclick="openSurah(${s.number})">${s.number}. ${s.englishName}</div>`).join("");
}
function toggleSidebar(){sidebar.classList.toggle("active");}

// ============================
// SURAH
// ============================
async function openSurah(num){
 currentSurah=Quran.find(s=>s.number==num);

 let t=await fetch(`https://api.alquran.cloud/v1/surah/${num}/en.asad`);
 let trans=(await t.json()).data.ayahs;

 let html=`<h2>${currentSurah.englishName}</h2>`;

 currentSurah.ayahs.forEach((a,i)=>{
 html+=`
 <div class="ayah">
  <div>${i+1}</div>
  <div class="arabic">${a.text}</div>
  ${showTrans?`<div>${trans[i].text}</div>`:""}

  <div class="controls">
   <button onclick="play(${a.number})">▶</button>
   <button onclick="loopAyah(${a.number})">🔁</button>
   <button onclick="contAyah(${i})">⏭</button>
   <button onclick="bookmark(${num},${i})">⭐</button>
   <button onclick="tafsir(${a.number})">📖</button>
  </div>
 </div>`;
 });

 content.innerHTML=html;
}

// ============================
// AUDIO
// ============================
function play(n){
 audio.src=`https://cdn.islamic.network/quran/audio/128/${reciter}/${n}.mp3`;
 audio.play();
}
function loopAyah(n){loop=true;cont=false;play(n);}
function contAyah(i){loop=false;cont=true;play(currentSurah.ayahs[i].number);}

audio.onended=()=>{
 if(loop) audio.play();
 if(cont){
  let i=currentSurah.ayahs.findIndex(a=>audio.src.includes(a.number));
  if(i+1<currentSurah.ayahs.length){
   play(currentSurah.ayahs[i+1].number);
  }
 }
};

// ============================
// BOOKMARK
// ============================
function bookmark(s,i){
 localStorage.setItem("bm",JSON.stringify({s,i}));
 alert("Saved ⭐");
}
function resume(){
 let b=JSON.parse(localStorage.getItem("bm"));
 if(b){openSurah(b.s);}
}

// ============================
// TAFSIR
// ============================
async function tafsir(n){
 let r=await fetch(`https://api.alquran.cloud/v1/ayah/${n}/en.asad`);
 alert((await r.json()).data.text);
}

// ============================
// SEARCH
// ============================
function search(q){
 q=q.toLowerCase();
 renderSidebar(Quran.filter(s=>s.englishName.toLowerCase().includes(q)));
}

// ============================
// DARK MODE
// ============================
function toggleDark(){document.body.classList.toggle("dark");}
function toggleTrans(){showTrans=!showTrans;if(currentSurah)openSurah(currentSurah.number);}

// ============================
// NAMAZ TIMES 🕌
// ============================
function getNamaz(){
 navigator.geolocation.getCurrentPosition(async pos=>{
  let lat=pos.coords.latitude;
  let lon=pos.coords.longitude;

  let r=await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}`);
  let d=(await r.json()).data.timings;

  alert(
`Fajr: ${d.Fajr}
Dhuhr: ${d.Dhuhr}
Asr: ${d.Asr}
Maghrib: ${d.Maghrib}
Isha: ${d.Isha}`
  );
 });
}

// ============================
// QIBLA 🧭
// ============================
function getQibla(){
 navigator.geolocation.getCurrentPosition(pos=>{
  let lat=pos.coords.latitude*Math.PI/180;
  let lon=pos.coords.longitude*Math.PI/180;

  let kaabaLat=21.4225*Math.PI/180;
  let kaabaLon=39.8262*Math.PI/180;

  let angle=Math.atan2(
    Math.sin(kaabaLon-lon),
    Math.cos(lat)*Math.tan(kaabaLat)-Math.sin(lat)*Math.cos(kaabaLon-lon)
  );

  angle=angle*180/Math.PI;
  alert("Qibla Direction: "+Math.round(angle)+"° 🧭");
 });
}

// ============================
// PWA
// ============================
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('service-worker.js');
}

// ============================
loadQuran();
</script>

</body>
</html>
